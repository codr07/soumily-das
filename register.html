<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - OCBMS</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">OCBMS</a>
        </div>
    </nav>

    <!-- Register Form -->
    <div class="container auth-wrapper py-5">
        <div class="auth-form shadow">
            <h3 class="text-center mb-4 border-bottom pb-2">Create Account</h3>
            <div id="registerAlert" class="alert alert-danger d-none"></div>
            <div id="registerSuccess" class="alert alert-success d-none">Registration successful! Redirecting to login...</div>

            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email address</label>
                    <input type="email" class="form-control" id="email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <select class="form-select" id="role" required>
                        <option value="Customer">Customer</option>
                        <option value="Artisan">Artisan (Seller)</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold">Register</button>
            </form>
            <div class="text-center mt-3">
                <p class="mb-0">Already have an account? <a href="login.html">Login</a></p>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#registerForm').on('submit', function(e) {
                e.preventDefault();
                $('#registerAlert').addClass('d-none');
                
                const data = {
                    username: $('#username').val(),
                    email: $('#email').val(),
                    password: $('#password').val(),
                    role: $('#role').val()
                };

                $.ajax({
                    url: '/api/auth/register',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(data),
                    success: function() {
                        $('#registerForm').slideUp();
                        $('#registerSuccess').removeClass('d-none');
                        setTimeout(() => window.location.href = 'login.html', 2000);
                    },
                    error: function(xhr) {
                        $('#registerAlert').text(xhr.responseJSON?.error || 'Registration failed').removeClass('d-none');
                    }
                });
            });
        });
    </script>
</body>
</html>
